<!DOCTYPE html>
<html lang="id">
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="DV Tech - Platform E-Commerce Jasa Layanan Digital. Website, Aplikasi Mobile, Desain UI/UX, dan solusi digital untuk bisnis Anda.">
  <meta name="theme-color" content="#4F46E5">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DV Tech">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>DV Tech - Platform Jasa Digital</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background-color: #0F172A; }
    #flutter-loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0F172A; z-index: 9999; transition: opacity 0.4s ease;
    }
    #flutter-loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(99,102,241,0.2); border-top-color: #6366F1;
      border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    #flutter-loading .brand {
      margin-top: 16px; color: rgba(255,255,255,0.5);
      font-family: system-ui, sans-serif; font-size: 13px; letter-spacing: 0.05em;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="flutter-loading">
    <div class="spinner"></div>
    <div class="brand">DV Tech</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('flutter-loading');
      if (el) { el.style.opacity = '0'; setTimeout(function() { el.remove(); }, 400); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
